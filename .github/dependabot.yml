version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      production:
        dependency-type: production
        update-types: [minor, patch]
      development:
        dependency-type: development
        update-types: [minor, patch]
    ignore:
      # Majors are deliberate manual migrations, never auto-PRs.
      - dependency-name: '*'
        update-types: [version-update:semver-major]
      # argon2 is 0.x: a "minor" bump (0.41 -> 0.45) is a breaking change, so pin
      # to patch-only and upgrade deliberately.
      - dependency-name: argon2
        update-types: [version-update:semver-minor]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ['*']

  - package-ecosystem: docker
    directories:
      - /apps/api
      - /apps/console
    schedule:
      interval: weekly
    ignore:
      - dependency-name: node
        update-types: [version-update:semver-major]
