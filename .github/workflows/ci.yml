name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: accesscore
          POSTGRES_PASSWORD: accesscore
          POSTGRES_DB: accesscore
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U accesscore"
          --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
      vault:
        image: hashicorp/vault:1.18
        env:
          VAULT_DEV_ROOT_TOKEN_ID: accesscore-dev-token
          VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
        ports: ['8200:8200']
        options: >-
          --cap-add=IPC_LOCK
          --health-cmd "wget -q -O /dev/null http://127.0.0.1:8200/v1/sys/health"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgres://accesscore:accesscore@localhost:5432/accesscore
      REDIS_URL: redis://localhost:6379
      VAULT_ADDR: http://localhost:8200
      VAULT_TOKEN: accesscore-dev-token
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm --filter @accesscore/api run db:migrate
      - run: pnpm --filter @accesscore/api run coverage
      - run: pnpm --filter @diegowritescode/accesscore-sdk run test
