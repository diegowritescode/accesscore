name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: accesscore
          POSTGRES_PASSWORD: accesscore
          POSTGRES_DB: accesscore
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U accesscore"
          --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    env:
      DATABASE_URL: postgres://accesscore:accesscore@localhost:5432/accesscore
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm --filter @accesscore/api run db:migrate
      - run: pnpm run test
      - run: pnpm --filter @accesscore/api run test:int
      - run: pnpm --filter @accesscore/api run test:e2e
